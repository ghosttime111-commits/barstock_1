<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#17130f" />
    <title>Нет подключения — BarStock</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #17130f;
        color: #f7f3ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #17130f;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
      }

      h1 {
        margin: 24px 0 0;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 12px 0 0;
        color: #b7ada1;
        font-size: 15px;
        line-height: 1.6;
      }

      button {
        min-height: 44px;
        margin-top: 24px;
        padding: 0 20px;
        border: 0;
        border-radius: 8px;
        background: #f5a524;
        color: #21170b;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid #f7f3ed;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-192x192.png" alt="" width="72" height="72" />
      <h1>Нет подключения к интернету</h1>
      <p>
        BarStock не может загрузить актуальные данные. Проверьте соединение и повторите попытку.
      </p>
      <button type="button" onclick="window.location.reload()">Повторить</button>
    </main>
  </body>
</html>
